<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Carteles — El Mercadito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&family=Playfair+Display:wght@600;700;900&family=Nunito:wght@600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2d6a4f;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header span { font-size: 1.6rem; }

    .app {
      display: flex;
      flex: 1;
      gap: 0;
      max-width: 1100px;
      margin: 24px auto;
      width: 100%;
      padding: 0 16px;
    }

    /* ── Panel de controles ── */
    .panel {
      width: 320px;
      flex-shrink: 0;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .panel h2 { font-size: 1rem; color: #555; font-weight: 600; border-bottom: 2px solid #e8e0d0; padding-bottom: 8px; }

    label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 4px; }

    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2d6a4f;
    }
    textarea { resize: vertical; min-height: 56px; font-family: inherit; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    .color-swatch {
      width: 100%;
      height: 38px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      padding: 2px 4px;
    }

    .palette {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .palette-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .palette-btn:hover { transform: scale(1.15); }
    .palette-btn.active { border-color: #333; transform: scale(1.15); }

    .tag-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 2px solid #e0d8cc;
      border-radius: 10px;
      background: #faf7f2;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      transition: all 0.15s;
      gap: 2px;
      line-height: 1.2;
    }
    .tag-btn small {
      font-size: 0.62rem;
      font-weight: 500;
      opacity: 0.65;
    }
    .tag-btn:hover { background: #f0e8dc; border-color: #bbb; }
    .tag-btn.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover { background: #1e4d38; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Área de previsualización ── */
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-left: 28px;
    }

    .preview-area h2 {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .preview-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    /* ── El cartel en sí ── */
    .cartel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .cartel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      opacity: 0.15;
      border-radius: inherit;
    }

    .cartel .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.9);
      color: #c0392b;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .05em;
      display: none;
    }

    .cartel .nombre {
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 6px;
    }

    .cartel .descripcion {
      font-size: 0.88rem;
      opacity: 0.85;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .cartel .precio-wrap {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .cartel .moneda {
      font-size: 1.1rem;
      font-weight: 700;
      opacity: 0.9;
    }

    .cartel .precio {
      font-weight: 900;
      line-height: 1;
    }

    .cartel .unidad {
      font-size: 0.78rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .cartel .precio-tachado {
      font-size: 0.9rem;
      text-decoration: line-through;
      opacity: 0.6;
      margin-top: 4px;
    }

    .cartel .divider {
      width: 60%;
      height: 2px;
      background: currentColor;
      opacity: 0.25;
      margin: 10px 0;
    }

    .no-print { /* nada que ocultar en print desde JS */ }

    /* ── Estilos de cartel ── */
    .estilo-clasico { border: 4px solid rgba(255,255,255,0.5); }
    .estilo-moderno { border-radius: 12px; }
    .estilo-etiqueta {
      border-radius: 4px;
      clip-path: polygon(0 0, 95% 0, 100% 50%, 95% 100%, 0 100%);
    }

    /* ── Tamaños ── */
    .tamano-pequeno { width: 180px; min-height: 160px; }
    .tamano-mediano { width: 240px; min-height: 210px; }
    .tamano-grande  { width: 310px; min-height: 270px; }

    /* ── Fuentes ── */
    .fuente-moderna   { font-family: 'Montserrat', sans-serif; }
    .fuente-clasica   { font-family: 'Playfair Display', serif; }
    .fuente-amigable  { font-family: 'Nunito', sans-serif; }

    /* Botones de fuente en su propia tipografía */
    .font-btn-moderna  { font-family: 'Montserrat', sans-serif !important; }
    .font-btn-clasica  { font-family: 'Playfair Display', serif !important; }
    .font-btn-amigable { font-family: 'Nunito', sans-serif !important; }

    /* ── Responsive ── */
    @media (max-width: 780px) {
      .app { flex-direction: column; }
      .panel { width: 100%; }
      .preview-area { padding-left: 0; padding-top: 20px; }
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      header, .panel, .preview-area h2, .btn-primary { display: none !important; }
      body, .app { background: white; margin: 0; padding: 0; }
      .preview-area { padding: 0; }
      .preview-wrap { gap: 12px; }
      .cartel { box-shadow: none; }
    }
  </style>
</head>
<body>

<header>
  <span>🛒</span>
  <h1>Generador de Carteles — El Mercadito</h1>
</header>

<div class="app">

  <!-- ── PANEL ── -->
  <div class="panel">

    <h2>Producto</h2>

    <div>
      <label>Nombre del producto</label>
      <input type="text" id="nombre" placeholder="Ej: Tomates cherry" value="Tomates cherry" />
    </div>

    <div>
      <label>Descripción (opcional)</label>
      <textarea id="descripcion" placeholder="Orgánicos · 250g">Orgánicos · 250g</textarea>
    </div>

    <div class="row2">
      <div>
        <label>Precio</label>
        <input type="number" id="precio" min="0" step="0.01" value="85" />
      </div>
      <div>
        <label>Moneda</label>
        <select id="moneda">
          <option value="$">$ (UYU)</option>
          <option value="U$S">U$S</option>
          <option value="€">€</option>
          <option value="">Sin moneda</option>
        </select>
      </div>
    </div>

    <div class="row2">
      <div>
        <label>Unidad</label>
        <input type="text" id="unidad" placeholder="c/u · kg · lt" value="c/u" />
      </div>
      <div>
        <label>Precio anterior</label>
        <input type="number" id="precioAnterior" min="0" step="0.01" placeholder="Opcional" />
      </div>
    </div>

    <div>
      <label>Etiqueta especial</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <button class="tag-btn" data-tag="">Ninguna</button>
        <button class="tag-btn" data-tag="¡OFERTA!">Oferta</button>
        <button class="tag-btn" data-tag="NUEVO">Nuevo</button>
        <button class="tag-btn" data-tag="ORGÁNICO">Orgánico</button>
        <button class="tag-btn" data-tag="ÚLTIMA UNIDAD">Última unidad</button>
      </div>
    </div>

    <h2>Diseño</h2>

    <div>
      <label>Paleta de color</label>
      <div class="palette" id="palette">
        <button class="palette-btn active" data-bg="#2d6a4f" data-fg="#ffffff" style="background:#2d6a4f"></button>
        <button class="palette-btn" data-bg="#e63946" data-fg="#ffffff" style="background:#e63946"></button>
        <button class="palette-btn" data-bg="#f4a261" data-fg="#3d1a00" style="background:#f4a261"></button>
        <button class="palette-btn" data-bg="#2c7da0" data-fg="#ffffff" style="background:#2c7da0"></button>
        <button class="palette-btn" data-bg="#6a0572" data-fg="#ffffff" style="background:#6a0572"></button>
        <button class="palette-btn" data-bg="#f7c59f" data-fg="#3d2b1f" style="background:#f7c59f"></button>
        <button class="palette-btn" data-bg="#264653" data-fg="#e9c46a" style="background:#264653"></button>
        <button class="palette-btn" data-bg="#e9c46a" data-fg="#264653" style="background:#e9c46a"></button>
      </div>
    </div>

    <div class="row2">
      <div>
        <label>Color fondo</label>
        <input type="color" class="color-swatch" id="colorFondo" value="#2d6a4f" />
      </div>
      <div>
        <label>Color texto</label>
        <input type="color" class="color-swatch" id="colorTexto" value="#ffffff" />
      </div>
    </div>

    <div>
      <label>Tamaño</label>
      <div class="row3">
        <button class="tag-btn" data-size="pequeno">Chico<small>7×3 cm</small></button>
        <button class="tag-btn active" data-size="mediano">Mediano<small>10×4 cm</small></button>
        <button class="tag-btn" data-size="grande">Grande<small>13×5 cm</small></button>
      </div>
    </div>

    <div>
      <label>Estilo</label>
      <div class="row3">
        <button class="tag-btn active" data-style="clasico">Clásico</button>
        <button class="tag-btn" data-style="moderno">Moderno</button>
        <button class="tag-btn" data-style="etiqueta">Etiqueta</button>
      </div>
    </div>

    <div>
      <label>Formato</label>
      <div class="row3">
        <button class="tag-btn active" data-formato="rectangular">▬ Rect.</button>
        <button class="tag-btn" data-formato="cuadrado">■ Cuadrado</button>
        <button class="tag-btn" data-formato="circular">● Circular</button>
      </div>
    </div>

    <div>
      <label>Puntas</label>
      <div class="row2">
        <button class="tag-btn active" data-puntas="redondas">╭ Redondas</button>
        <button class="tag-btn" data-puntas="rectas">▢ Rectas</button>
      </div>
    </div>

    <div>
      <label>Fuente</label>
      <div class="row3">
        <button class="tag-btn active font-btn-moderna" data-fuente="moderna">Moderna</button>
        <button class="tag-btn font-btn-clasica" data-fuente="clasica">Clásica</button>
        <button class="tag-btn font-btn-amigable" data-fuente="amigable">Amigable</button>
      </div>
    </div>

    <div>
      <label>Tamaño de fuente del precio</label>
      <input type="range" id="fuentePrecio" min="2" max="5" step="0.5" value="3.5" style="width:100%" />
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn-primary" id="btnAgregar">
        <span>+</span> Agregar cartel
      </button>
      <button class="btn-primary" id="btnImprimir" style="background:#555;flex:0 0 auto;padding:12px 14px;" title="Imprimir">
        🖨️
      </button>
    </div>

    <div style="display:flex;gap:6px">
      <button class="btn-primary" id="btnPng" style="background:#1a6fa8;font-size:0.82rem;padding:10px 6px;">⬇ PNG</button>
      <button class="btn-primary" id="btnJpg" style="background:#1a6fa8;font-size:0.82rem;padding:10px 6px;">⬇ JPG</button>
      <button class="btn-primary" id="btnPdf" style="background:#a83232;font-size:0.82rem;padding:10px 6px;">⬇ PDF</button>
      <div id="exportSpinner" style="display:none;align-items:center;color:#888;font-size:0.8rem;padding-left:4px;">Generando…</div>
    </div>

    <button class="btn-primary" id="btnLimpiar" style="background:#c0392b">
      🗑️ Limpiar todos
    </button>

  </div>

  <!-- ── PREVISUALIZACIÓN ── -->
  <div class="preview-area">
    <h2>Vista previa</h2>
    <div class="preview-wrap" id="previewWrap">
      <!-- carteles generados aquí -->
    </div>
  </div>

</div>

<script>
  // Estado
  const state = {
    bg: '#2d6a4f',
    fg: '#ffffff',
    size: 'mediano',
    style: 'clasico',
    tag: '',
    formato: 'rectangular',
    puntas: 'redondas',
    fuente: 'moderna',
  };

  function getVal(id) { return document.getElementById(id).value.trim(); }

  function crearCartel() {
    const nombre   = getVal('nombre') || 'Producto';
    const desc     = getVal('descripcion');
    const precio   = getVal('precio');
    const moneda   = getVal('moneda');
    const unidad   = getVal('unidad');
    const anterior = getVal('precioAnterior');
    const fuente   = parseFloat(document.getElementById('fuentePrecio').value);

    const wrap = document.createElement('div');
    wrap.className = `cartel estilo-${state.style} tamano-${state.size} fuente-${state.fuente}`;
    wrap.style.background = state.bg;
    wrap.style.color = state.fg;

    // Formato y puntas
    const sizeMap = { pequeno: 180, mediano: 240, grande: 310 };
    const side = sizeMap[state.size];
    if (state.formato === 'cuadrado') {
      wrap.style.width = side + 'px';
      wrap.style.height = side + 'px';
      wrap.style.minHeight = side + 'px';
      wrap.style.borderRadius = state.puntas === 'rectas' ? '4px' : '20px';
    } else if (state.formato === 'circular') {
      wrap.style.width = side + 'px';
      wrap.style.height = side + 'px';
      wrap.style.minHeight = side + 'px';
      wrap.style.borderRadius = '50%';
      wrap.style.overflow = 'hidden';
    } else {
      // rectangular apaisado (más ancho que alto)
      // 1cm ≈ 37.8px a 96dpi → 7×3, 10×4, 13×5 cm
      const rectW = { pequeno: 265, mediano: 378, grande: 491 };
      const rectH = { pequeno: 113, mediano: 151, grande: 189 };
      wrap.style.width = rectW[state.size] + 'px';
      wrap.style.height = rectH[state.size] + 'px';
      wrap.style.minHeight = rectH[state.size] + 'px';
      wrap.style.padding = '14px 26px';
      wrap.style.borderRadius = state.puntas === 'rectas' ? '4px' : '14px';
    }

    // ── Botón eliminar (siempre presente, posición absoluta) ──
    const del = document.createElement('button');
    del.textContent = '×';
    del.title = 'Eliminar este cartel';
    Object.assign(del.style, {
      position: 'absolute', top: '6px', left: '8px',
      background: 'rgba(0,0,0,0.25)', color: '#fff',
      border: 'none', borderRadius: '50%', width: '22px', height: '22px',
      cursor: 'pointer', fontSize: '14px', lineHeight: '22px', textAlign: 'center',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '0', zIndex: '2',
    });
    del.addEventListener('click', () => wrap.remove());
    wrap.appendChild(del);

    const sizeName = state.size === 'pequeno' ? '1rem' : state.size === 'grande' ? '1.4rem' : '1.15rem';

    if (state.formato === 'rectangular') {
      // ── Layout horizontal: info izquierda | divider | precio derecha ──
      wrap.style.flexDirection = 'row';
      wrap.style.alignItems = 'center';
      wrap.style.justifyContent = 'space-between';

      // Columna izquierda (nombre + desc + badge)
      const colInfo = document.createElement('div');
      Object.assign(colInfo.style, { flex: '1', textAlign: 'left', minWidth: '0' });

      if (state.tag) {
        const badge = document.createElement('div');
        badge.className = 'badge';
        Object.assign(badge.style, {
          position: 'static', display: 'inline-block', marginBottom: '4px',
          background: 'rgba(255,255,255,0.9)', color: '#c0392b',
          fontSize: '0.62rem', fontWeight: '800', padding: '2px 7px',
          borderRadius: '20px', textTransform: 'uppercase',
        });
        badge.textContent = state.tag;
        colInfo.appendChild(badge);
      }

      const divNombre = document.createElement('div');
      divNombre.className = 'nombre';
      divNombre.style.fontSize = sizeName;
      divNombre.style.textAlign = 'left';
      divNombre.textContent = nombre;
      colInfo.appendChild(divNombre);

      if (desc) {
        const divDesc = document.createElement('div');
        divDesc.className = 'descripcion';
        divDesc.style.textAlign = 'left';
        divDesc.style.marginBottom = '0';
        divDesc.textContent = desc;
        colInfo.appendChild(divDesc);
      }
      wrap.appendChild(colInfo);

      // Divisor vertical
      const divV = document.createElement('div');
      Object.assign(divV.style, {
        width: '2px', alignSelf: 'stretch',
        background: 'currentColor', opacity: '0.25', margin: '0 16px', flexShrink: '0',
      });
      wrap.appendChild(divV);

      // Columna derecha (precio)
      const colPrecio = document.createElement('div');
      Object.assign(colPrecio.style, {
        display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: '0',
      });

      if (precio) {
        const priceWrap = document.createElement('div');
        priceWrap.className = 'precio-wrap';
        if (moneda) {
          const mon = document.createElement('span');
          mon.className = 'moneda';
          mon.textContent = moneda;
          priceWrap.appendChild(mon);
        }
        const p = document.createElement('span');
        p.className = 'precio';
        p.style.fontSize = fuente + 'rem';
        p.textContent = precio;
        priceWrap.appendChild(p);
        colPrecio.appendChild(priceWrap);

        if (unidad) {
          const u = document.createElement('div');
          u.className = 'unidad';
          u.textContent = unidad;
          colPrecio.appendChild(u);
        }
        if (anterior) {
          const tach = document.createElement('div');
          tach.className = 'precio-tachado';
          tach.textContent = (moneda || '') + ' ' + anterior;
          colPrecio.appendChild(tach);
        }
      }
      wrap.appendChild(colPrecio);

    } else {
      // ── Layout vertical (cuadrado / circular) ──
      const badge = document.createElement('div');
      badge.className = 'badge';
      if (state.tag) { badge.textContent = state.tag; badge.style.display = 'block'; }
      wrap.appendChild(badge);

      const divNombre = document.createElement('div');
      divNombre.className = 'nombre';
      divNombre.style.fontSize = sizeName;
      divNombre.textContent = nombre;
      wrap.appendChild(divNombre);

      if (desc) {
        const divDesc = document.createElement('div');
        divDesc.className = 'descripcion';
        divDesc.textContent = desc;
        wrap.appendChild(divDesc);
      }

      const divH = document.createElement('div');
      divH.className = 'divider';
      wrap.appendChild(divH);

      if (precio) {
        const priceWrap = document.createElement('div');
        priceWrap.className = 'precio-wrap';
        if (moneda) {
          const mon = document.createElement('span');
          mon.className = 'moneda';
          mon.textContent = moneda;
          priceWrap.appendChild(mon);
        }
        const p = document.createElement('span');
        p.className = 'precio';
        p.style.fontSize = fuente + 'rem';
        p.textContent = precio;
        priceWrap.appendChild(p);
        wrap.appendChild(priceWrap);

        if (unidad) {
          const u = document.createElement('div');
          u.className = 'unidad';
          u.textContent = unidad;
          wrap.appendChild(u);
        }
        if (anterior) {
          const tach = document.createElement('div');
          tach.className = 'precio-tachado';
          tach.textContent = (moneda || '') + ' ' + anterior;
          wrap.appendChild(tach);
        }
      }
    }

    return wrap;
  }

  document.getElementById('btnAgregar').addEventListener('click', () => {
    const cartel = crearCartel();
    document.getElementById('previewWrap').prepend(cartel);
  });

  document.getElementById('btnImprimir').addEventListener('click', () => {
    // Ocultar botones de eliminar antes de imprimir
    document.querySelectorAll('.cartel button').forEach(b => b.style.display = 'none');
    window.print();
    document.querySelectorAll('.cartel button').forEach(b => b.style.display = '');
  });

  document.getElementById('btnLimpiar').addEventListener('click', () => {
    if (confirm('¿Borrar todos los carteles?')) {
      document.getElementById('previewWrap').innerHTML = '';
    }
  });

  // Paleta de colores
  document.getElementById('palette').addEventListener('click', e => {
    const btn = e.target.closest('.palette-btn');
    if (!btn) return;
    document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.bg = btn.dataset.bg;
    state.fg = btn.dataset.fg;
    document.getElementById('colorFondo').value = state.bg;
    document.getElementById('colorTexto').value = state.fg;
  });

  document.getElementById('colorFondo').addEventListener('input', e => {
    state.bg = e.target.value;
    document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
  });
  document.getElementById('colorTexto').addEventListener('input', e => {
    state.fg = e.target.value;
    document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
  });

  // Tamaño
  document.querySelectorAll('[data-size]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.size = btn.dataset.size;
    });
  });

  // Estilo
  document.querySelectorAll('[data-style]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.style = btn.dataset.style;
    });
  });

  // Tag especial
  document.querySelectorAll('[data-tag]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tag]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.tag = btn.dataset.tag;
    });
  });
  document.querySelector('[data-tag=""]').classList.add('active');

  // Formato
  document.querySelectorAll('[data-formato]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-formato]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.formato = btn.dataset.formato;
    });
  });

  // Puntas
  document.querySelectorAll('[data-puntas]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-puntas]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.puntas = btn.dataset.puntas;
    });
  });

  // Fuente
  document.querySelectorAll('[data-fuente]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-fuente]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.fuente = btn.dataset.fuente;
    });
  });

  // ── Exportar PNG / JPG / PDF ──
  async function exportar(tipo) {
    const carteles = [...document.querySelectorAll('.cartel')];
    if (!carteles.length) { alert('Primero agregá al menos un cartel.'); return; }

    const spinner = document.getElementById('exportSpinner');
    spinner.style.display = 'flex';
    document.querySelectorAll('.cartel button').forEach(b => b.style.visibility = 'hidden');

    try {
      if (tipo === 'pdf') {
        const { jsPDF } = window.jspdf;
        let pdf = null;
        for (let i = 0; i < carteles.length; i++) {
          const canvas = await html2canvas(carteles[i], { scale: 3, useCORS: true, logging: false });
          const w = canvas.width;
          const h = canvas.height;
          if (i === 0) {
            pdf = new jsPDF({ unit: 'px', format: [w, h], orientation: w > h ? 'landscape' : 'portrait' });
          } else {
            pdf.addPage([w, h], w > h ? 'landscape' : 'portrait');
          }
          pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, h);
        }
        pdf.save('carteles-mercadito.pdf');
      } else {
        const mime = tipo === 'jpg' ? 'image/jpeg' : 'image/png';
        for (let i = 0; i < carteles.length; i++) {
          const canvas = await html2canvas(carteles[i], { scale: 3, useCORS: true, logging: false });
          const a = document.createElement('a');
          a.download = `cartel-${i + 1}.${tipo}`;
          a.href = canvas.toDataURL(mime, 0.95);
          a.click();
          await new Promise(r => setTimeout(r, 300));
        }
      }
    } finally {
      document.querySelectorAll('.cartel button').forEach(b => b.style.visibility = '');
      spinner.style.display = 'none';
    }
  }

  document.getElementById('btnPng').addEventListener('click', () => exportar('png'));
  document.getElementById('btnJpg').addEventListener('click', () => exportar('jpg'));
  document.getElementById('btnPdf').addEventListener('click', () => exportar('pdf'));

  // Generar el primer cartel de muestra al cargar
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btnAgregar').click();
  });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
